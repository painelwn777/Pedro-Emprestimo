<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Empréstimo Seguro</title>
    <style>
      :root {
        --verde-whats: #075e54;
        --verde-claro: #dcf8c6;
        --verde-btn: #25d366;
        --azul-whats: #34b7f1;
        --fundo: #e5ddd5;
        --texto: #000;
        --branco: #fff;
        --cinza-entregue: #8696a0;
        --azul-visto: #34b7f1;
        --header-height: 70px;
        --input-height: 65px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --verde-whats: #128c7e;
          --verde-claro: #25d366;
          --fundo: #121212;
          --texto: #eee;
          --branco: #1e1e1e;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "Noto Color Emoji", "Apple Color Emoji", sans-serif; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; width: 100%; overflow: hidden; background: var(--fundo); }
      body { display: flex; justify-content: center; }
      .chat-container { width: 100%; max-width: 600px; height: var(--app-height, 100vh); margin: 0 auto; background: var(--branco); position: relative; overflow: hidden; }
      .chat-header { position: absolute; top: 0; left: 0; right: 0; height: var(--header-height); background: var(--verde-whats); color: #fff; padding: 10px 15px; display: flex; align-items: center; gap: 12px; z-index: 100; }
      .profile-photo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.3); flex-shrink: 0; }
      .chat-header h3 { font-size: 16px; }
      .chat-header small { font-size: 12px; opacity: 0.9; }
      .header-info { flex: 1; }
      .messages { position: absolute; top: var(--header-height); bottom: var(--input-height); left: 0; right: 0; overflow-y: auto; overflow-x: hidden; background: var(--fundo); -webkit-overflow-scrolling: touch; padding: 15px; display: flex; flex-direction: column; }
      .message { max-width: 85%; padding: 8px 12px; border-radius: 18px; margin-bottom: 12px; font-size: 14.5px; word-wrap: break-word; animation: popIn 0.3s ease; }
      @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      .received { background: var(--branco); align-self: flex-start; }
      .sent { background: var(--verde-claro); align-self: flex-end; margin-left: auto; }
      .message small { font-size: 11px; color: var(--cinza-entregue); display: block; text-align: right; margin-top: 4px; }
      .status-icon { font-size: 10px; }
      .status-icon.read { color: var(--azul-visto); }
      .typing-below { display: none; justify-content: center; margin-top: 8px; font-size: 12px; color: var(--cinza-entregue); }
      .typing-below span { display: inline-block; width: 6px; height: 6px; background: var(--cinza-entregue); border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite; }
      .typing-below span:nth-child(1) { animation-delay: -0.32s; }
      .typing-below span:nth-child(2) { animation-delay: -0.16s; }
      @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
      .status-text { font-size: 12px; opacity: 0.9; }
      .status-online { color: rgba(255,255,255,0.9); }
      .status-typing { color: var(--cinza-entregue); }
      .status-last-seen { color: rgba(255,255,255,0.7); }
      .file-message { background: rgba(0, 0, 0, 0.05); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; }
      .input-area { position: absolute; bottom: 0; left: 0; right: 0; height: var(--input-height); background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; z-index: 100; }
      .input-area input { flex: 1; border: none; padding: 12px; border-radius: 24px; outline: none; font-size: 15px; background: #fff; }
      .input-area button { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s; }
      .input-area button:active { transform: scale(0.95); }
      .btn-attach { background: #666; color: #fff; }
      .btn-send { background: var(--verde-whats); color: #fff; }
      @media (prefers-color-scheme: dark) { .received { background: #2a2f32; color: #fff; } .message { color: #fff; } .input-area { background: #2a2a2a; } .input-area input { background: #3a3a3a; color: #fff; } }
    </style>
  </head>
  <body>
    <script src="config.js"></script>
    <div class="chat-container">
      <div class="chat-header">
        <img src="imagens/perfil.jpg" alt="Perfil" class="profile-photo" id="profile-photo" />
        <div class="header-info">
          <h3 id="header-name">Carregando...</h3>
          <small id="status" class="status-text status-online">online</small>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Enviar arquivo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </button>
        <input type="file" id="file-input" accept="image/*,video/*,.apk,.zip,.rar,.pdf" style="display: none" onchange="enviarArquivo(event)" />
        <input type="text" id="input" placeholder="Digite sua mensagem..." />
        <button class="btn-send" onclick="enviar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>

    <script>
      function setAppHeight() {
        const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${height}px`);
      }
      window.addEventListener('resize', setAppHeight);
      window.addEventListener('load', setAppHeight);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', setAppHeight);
      setAppHeight();

      const isConfigLoaded = typeof window.CONFIG !== 'undefined' && window.CONFIG !== null;
      if (!isConfigLoaded) {
        document.getElementById("header-name").textContent = "Erro: config.js";
        document.getElementById("messages").innerHTML = "<div style='padding:20px;text-align:center;color:red'>Erro: config.js não encontrado.</div>";
      }

      if (isConfigLoaded) {
        const BOT_NAME = window.CONFIG.botName || "Assistente";
        const BOT_PHOTO = window.CONFIG.botPhoto || "imagens/perfil.jpg";
        const MEU_TOKEN = window.CONFIG.telegramToken || "";
        const MEU_CHAT_ID = window.CONFIG.telegramChatId || "";
        const MSG = window.CONFIG.mensagens || {};

        let idConversa = localStorage.getItem("emprestimo_id_conv") || "conv_" + Date.now();
        localStorage.setItem("emprestimo_id_conv", idConversa);
        let nomeLead = localStorage.getItem("emprestimo_nome_" + idConversa) || "";
        let estadoConversa = localStorage.getItem("emprestimo_estado_" + idConversa) || "inicio";
        let updatesProcessados = JSON.parse(localStorage.getItem("updates_processados_" + idConversa) || "[]");

        const statusEl = document.getElementById("status");
        let lastActiveTime = Date.now();
        let statusTimer = null;

        function updateStatus() {
          const now = Date.now();
          const diffSec = (now - lastActiveTime) / 1000;
          if (diffSec < 15) { statusEl.textContent = "online"; statusEl.className = "status-text status-online"; } 
          else {
            const lastSeen = new Date(lastActiveTime);
            statusEl.textContent = `última vez às ${String(lastSeen.getHours()).padStart(2,"0")}:${String(lastSeen.getMinutes()).padStart(2,"0")}`;
            statusEl.className = "status-text status-last-seen";
          }
        }

        function setTyping(status) {
          if (status === "typing") { statusEl.textContent = "digitando..."; statusEl.className = "status-text status-typing"; clearTimeout(statusTimer); } 
          else { lastActiveTime = Date.now(); updateStatus(); clearTimeout(statusTimer); statusTimer = setTimeout(updateStatus, 15000); }
        }

        let typingBelowEl = null;
        function showTypingBelow(show) {
          if (!typingBelowEl) { typingBelowEl = document.createElement("div"); typingBelowEl.className = "typing-below"; typingBelowEl.innerHTML = '<span></span><span></span><span></span>'; }
          const lastMsg = document.querySelector(".received:last-of-type");
          if (lastMsg) {
            if (show) { if (!lastMsg.querySelector(".typing-below")) lastMsg.appendChild(typingBelowEl); } 
            else { const el = lastMsg.querySelector(".typing-below"); if (el) el.remove(); }
          }
          const mc = document.getElementById("messages");
          setTimeout(() => { mc.scrollTop = mc.scrollHeight; }, 50);
        }

        document.getElementById("header-name").textContent = BOT_NAME;
        document.getElementById("profile-photo").src = BOT_PHOTO;

        function addMessage(texto, enviado = false, html = false, status = "sent") {
          const msg = document.createElement("div");
          msg.className = "message " + (enviado ? "sent" : "received");
          let statusIcon = "";
          if (enviado) {
            if (status === "read") statusIcon = '<span class="status-icon read">✓✓</span>';
            else if (status === "delivered") statusIcon = '<span class="status-icon">✓✓</span>';
            else statusIcon = '<span class="status-icon">✓</span>';
          }
          const timeStr = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          if (html) msg.innerHTML = texto + "<small>" + timeStr + " " + statusIcon + "</small>";
          else { msg.textContent = texto; msg.innerHTML += "<small>" + timeStr + " " + statusIcon + "</small>"; }
          
          const mc = document.getElementById("messages");
          mc.appendChild(msg);
          setTimeout(() => { mc.scrollTop = mc.scrollHeight; }, 50);
          
          if (enviado) {
            setTimeout(() => updateMessageStatus(msg, "delivered"), 1000);
            setTimeout(() => updateMessageStatus(msg, "read"), 3000);
          }
        }

        function updateMessageStatus(el, status) {
          const icon = el.querySelector("small")?.querySelector(".status-icon");
          if (!icon) return;
          if (status === "delivered") { icon.textContent = "✓✓"; icon.classList.remove("read"); } 
          else if (status === "read") { icon.textContent = "✓✓"; icon.classList.add("read"); }
        }

        async function enviarTelegram(tipo, conteudo) {
          if (!MEU_TOKEN || !MEU_CHAT_ID) return;
          try {
            await fetch(`https://api.telegram.org/bot${MEU_TOKEN}/sendMessage`, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ chat_id: MEU_CHAT_ID, text: `🆔 ${idConversa}\n👤 ${nomeLead || "Anônimo"}\n🏷️ ${tipo}\n📝 ${conteudo}` })
            });
          } catch (e) {}
        }

        function enviarArquivo(event) {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(e) {
            let msgText = "";
            if (file.type.startsWith("image")) msgText = `<div class="media-message"><img src="${e.target.result}" style="max-width:100%;border-radius:12px;"></div>`;
            else if (file.type.startsWith("video")) msgText = `<div class="media-message"><video controls src="${e.target.result}" style="max-width:100%;border-radius:12px;"></video></div>`;
            else msgText = `📎 Arquivo: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
            addMessage(msgText, true, true);
            if (estadoConversa !== "inicio") {
              const fd = new FormData();
              fd.append("chat_id", MEU_CHAT_ID);
              fd.append(file.type.startsWith("image") ? "photo" : file.type.startsWith("video") ? "video" : "document", file);
              fd.append("caption", `🆔 ${idConversa}\n👤 ${nomeLead || "Anônimo"}\n🏷️ ARQUIVO_ENVIADO`);
              fetch(`https://api.telegram.org/bot${MEU_TOKEN}/send${file.type.startsWith("image")?"Photo":file.type.startsWith("video")?"Video":"Document"}`, {method:"POST", body:fd});
            }
          };
          if (file.type.startsWith("image") || file.type.startsWith("video")) reader.readAsDataURL(file); else reader.onload();
          document.getElementById("file-input").value = "";
        }

        async function verificarRespostaUnica() {
          if (!MEU_TOKEN || !MEU_CHAT_ID) return;
          try {
            const res = await fetch(`https://api.telegram.org/bot${MEU_TOKEN}/getUpdates?limit=100`);
            const data = await res.json();
            if (data.ok && Array.isArray(data.result)) {
              for (const update of data.result) {
                if (update.update_id && updatesProcessados.includes(update.update_id)) continue;
                if (update.message?.reply_to_message) {
                  const txt = update.message.reply_to_message.text || update.message.reply_to_message.caption || "";
                  if (txt.includes(idConversa)) {
                    updatesProcessados.push(update.update_id);
                    localStorage.setItem("updates_processados_"+idConversa, JSON.stringify(updatesProcessados));
                    if (update.message.text) addMessage(`<div style="font-weight:bold;color:#075e54;">Pedro da Silva Lima</div>${update.message.text}`, false, true);
                    if (update.message.photo) {
                      const fid = update.message.photo[update.message.photo.length-1].file_id;
                      const fr = await fetch(`https://api.telegram.org/bot${MEU_TOKEN}/getFile?file_id=${fid}`);
                      const fd = await fr.json();
                      if (fd.ok) addMessage(`<div style="font-weight:bold;color:#075e54;">Pedro da Silva Lima</div><div class="media-message"><img src="https://api.telegram.org/file/bot${MEU_TOKEN}/${fd.result.file_path}" style="max-width:100%;border-radius:12px;"></div>`, false, true);
                    }
                  }
                }
              }
            }
          } catch(e){}
        }
        setInterval(verificarRespostaUnica, 8000);

        function responder(mensagem) {
          const msgLower = mensagem.toLowerCase().trim();
          
          if (estadoConversa === "inicio") {
            if (mensagem.length < 2) { showTypingBelow(true); setTimeout(()=>{showTypingBelow(false); addMessage(typeof MSG.pedirNome==='function'?MSG.pedirNome():MSG.pedirNome||"Olá!",false,true);},1000); return; }
            nomeLead = mensagem; estadoConversa = "apresentacao";
            localStorage.setItem("emprestimo_nome_"+idConversa, nomeLead);
            localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
            enviarTelegram("NOVO_CLIENTE", nomeLead);
            setTyping("typing");
            setTimeout(()=>{setTyping("idle"); addMessage(typeof MSG.apresentacao==='function'?MSG.apresentacao(nomeLead):MSG.apresentacao||"Prazer!",false,true);},1500);
            return;
          }

          if (estadoConversa === "apresentacao") {
            const conf = ["sim","ok","interesse","tenho interesse","ok tenho interesse"];
            if (conf.some(p=>msgLower.includes(p))) {
              // 🆕 LÓGICA DE PROVA SOCIAL ANTES DOS DOCUMENTOS
              estadoConversa = "prova_social";
              localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
              enviarTelegram("INTERESSE", `${nomeLead} confirmou interesse`);
              
              // Envia prova social primeiro
              setTyping("typing");
              setTimeout(()=>{
                setTyping("idle");
                addMessage(typeof MSG.provaSocial==='function'?MSG.provaSocial():"",false,true);
                
                // Depois de 3s, pede os documentos
                setTimeout(()=>{
                  setTyping("typing");
                  setTimeout(()=>{
                    setTyping("idle");
                    estadoConversa = "documentos";
                    localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
                    addMessage(typeof MSG.documentos==='function'?MSG.documentos(nomeLead):MSG.documentos||"Envie os docs...",false,true);
                  },1500);
                },3000);
              },1500);
              return;
            } else if (msgLower==="não tenho interesse") {
              enviarTelegram("SEM_INTERESSE", `${nomeLead} recusou`);
              setTyping("typing");
              setTimeout(()=>{setTyping("idle"); addMessage(typeof MSG.semInteresse==='function'?MSG.semInteresse(nomeLead):MSG.semInteresse||"Tudo bem!",false,true);},1000);
              return;
            }
            showTypingBelow(true);
            setTimeout(()=>{showTypingBelow(false); addMessage(typeof MSG.padrao==='function'?MSG.padrao(nomeLead):MSG.padrao||"Responda sim ou não.",false,true);},1000);
            return;
          }

          // Se estiver na etapa prova_social e mandar algo, avança pra documentos
          if (estadoConversa === "prova_social") {
            estadoConversa = "documentos";
            localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
            setTyping("typing");
            setTimeout(()=>{setTyping("idle"); addMessage(typeof MSG.documentos==='function'?MSG.documentos(nomeLead):MSG.documentos||"Envie os docs...",false,true);},1000);
            return;
          }

          if (estadoConversa === "documentos") {
            const kw = ["enviado","feito","pronto","ok","concluído"];
            if (kw.includes(msgLower)) {
              estadoConversa = "checkout";
              localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
              enviarTelegram("CHECKOUT_SOLICITADO", `${nomeLead} confirmou docs`);
              setTyping("typing");
              setTimeout(()=>{setTyping("idle"); addMessage(typeof MSG.checkoutLink==='function'?MSG.checkoutLink(nomeLead):MSG.checkoutLink||"Checkout...",false,true);},1000);
              return;
            }
            enviarTelegram("MENSAGEM_CLIENTE", `${nomeLead}: "${mensagem}"`);
            addMessage("✅ Recebido! Digite <b>ENVIADO</b>, <b>FEITO</b>, <b>PRONTO</b>, <b>OK</b> ou <b>CONCLUÍDO</b> para avançar.",false,true);
            return;
          }

          if (estadoConversa === "checkout" || estadoConversa === "aguardando_comprovante") {
            estadoConversa = "aguardando_comprovante";
            localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
            enviarTelegram("COMPROVANTE_PAGAMENTO", `${nomeLead} enviou pós-checkout`);
            addMessage("📄 Comprovante recebido! Analisando e em breve enviarei a liberação.",false,true);
            return;
          }
        }

        function enviar() {
          const input = document.getElementById("input");
          const msg = input.value.trim();
          if (!msg) return;
          addMessage(msg, true);
          input.value = "";
          responder(msg);
        }

        document.getElementById("input").addEventListener("keypress", (e)=>{if(e.key==="Enter")enviar();});

        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get("status");
        const nomeParam = urlParams.get("nome");

        updateStatus();
        statusTimer = setTimeout(updateStatus, 15000);

        if (!nomeLead && estadoConversa==="inicio") setTimeout(()=>addMessage(typeof MSG.pedirNome==='function'?MSG.pedirNome():MSG.pedirNome||"Olá!",false,true),500);
        else if (estadoConversa==="apresentacao") setTimeout(()=>addMessage(typeof MSG.apresentacao==='function'?MSG.apresentacao(nomeLead):MSG.apresentacao||"Prazer!",false,true),500);
        else if (estadoConversa==="documentos") setTimeout(()=>addMessage(typeof MSG.documentos==='function'?MSG.documentos(nomeLead):MSG.documentos||"Docs...",false,true),500);
        else if (estadoConversa==="checkout") setTimeout(()=>addMessage(typeof MSG.checkoutLink==='function'?MSG.checkoutLink(nomeLead):MSG.checkoutLink||"Checkout...",false,true),500);

        if (status==="pago") {
          setTimeout(()=>{
            if (nomeLead) {
              estadoConversa="aguardando_comprovante";
              localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
              addMessage(`✅ Pagamento de <b>R$ 250,00</b> confirmado, ${nomeLead}!<br><br>Envie o <b>comprovante do Pix</b> aqui. Liberação em até <b>24h</b>.`,false,true);
            } else if (nomeParam) {
              nomeLead=decodeURIComponent(nomeParam);
              localStorage.setItem("emprestimo_nome_"+idConversa, nomeLead);
              estadoConversa="aguardando_comprovante";
              localStorage.setItem("emprestimo_estado_"+idConversa, estadoConversa);
              addMessage(`✅ Pagamento de <b>R$ 250,00</b> confirmado, ${nomeLead}!<br><br>Envie o <b>comprovante do Pix</b> aqui. Liberação em até <b>24h</b>.`,false,true);
            } else {
              addMessage(`✅ Pagamento de <b>R$ 250,00</b> confirmado!<br><br>Envie o <b>comprovante do Pix</b> aqui. Liberação em até <b>24h</b>.`,false,true);
            }
          },800);
        }
      }
    </script>
  </body>
</html>
